# ═══════════════════════════════════════════════════════════════
# DOCKER COMPOSE — KONG + KONGA + POSTGRESQL
# Ambiente exclusivo para visualização e demonstração do Kong.
#
# ATENÇÃO: Este arquivo NÃO é o ambiente de produção do projeto.
# O ambiente oficial roda no Kubernetes (k8s/kong/).
# Use este arquivo apenas para demonstração visual via Konga.
# ═══════════════════════════════════════════════════════════════

networks:
  kong-visual-net:
    driver: bridge

services:

  # ── PostgreSQL ─────────────────────────────────────────────
  # Banco de dados do Kong e do Konga.
  # O Kong em modo DB salva todas as configurações aqui.
  kong-database:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${KONG_DB_USERNAME}
      POSTGRES_PASSWORD: ${KONG_DB_PASSWORD}
      POSTGRES_DB: ${KONG_DB_NAME}
    networks:
      - kong-visual-net
    volumes:
      - kong-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${KONG_DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kong Migrations ────────────────────────────────────────
  # Roda as migrations do banco antes de subir o Kong.
  # Executa uma vez e encerra (restart: on-failure).
  kong-migrations:
    image: kong:3.4
    entrypoint: "kong migrations bootstrap"
    environment:
      KONG_DATABASE: ${KONG_DATABASE}
      KONG_PG_HOST: kong-database
      KONG_PG_DATABASE: ${KONG_DB_NAME}
      KONG_PG_USER: ${KONG_DB_USERNAME}
      KONG_PG_PASSWORD: ${KONG_DB_PASSWORD}
    networks:
      - kong-visual-net
    depends_on:
      kong-database:
        condition: service_healthy
    restart: on-failure

  # ── Kong ───────────────────────────────────────────────────
  # API Gateway em modo DB (com PostgreSQL).
  # Neste modo as configurações são salvas no banco e
  # podem ser gerenciadas via Konga ou Kong Manager.
  kong:
    image: kong:3.4
    restart: always
    environment:
      KONG_DATABASE: ${KONG_DATABASE}
      KONG_PG_HOST: kong-database
      KONG_PG_DATABASE: ${KONG_DB_NAME}
      KONG_PG_USER: ${KONG_DB_USERNAME}
      KONG_PG_PASSWORD: ${KONG_DB_PASSWORD}
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_ADMIN_GUI_LISTEN: 0.0.0.0:8002
      KONG_ADMIN_GUI_URL: http://localhost:8002
    ports:
      - "8000:8000"   # Proxy HTTP (entrada das requisições)
      - "8001:8001"   # Admin API
      - "8002:8002"   # Kong Manager OSS
    networks:
      - kong-visual-net
    depends_on:
      kong-database:
        condition: service_healthy
      kong-migrations:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Konga Prepare ──────────────────────────────────────────
  # Prepara o banco de dados do Konga antes de subir a interface.
  # Executa uma vez e encerra (restart: on-failure).
  konga-prepare:
    image: pantsel/konga:latest
    command: "-c prepare -a postgres -u postgresql://${KONG_DB_USERNAME}:${KONG_DB_PASSWORD}@kong-database:5432/${KONGA_DB_NAME}"
    networks:
      - kong-visual-net
    depends_on:
      kong-database:
        condition: service_healthy
    restart: on-failure

  # ── Konga ──────────────────────────────────────────────────
  # Interface web para gerenciamento visual do Kong.
  # Acesse: http://localhost:1337
  # Na primeira vez, crie um usuário admin e conecte ao Kong
  # usando a URL: http://kong:8001
  konga:
    image: pantsel/konga:latest
    restart: always
    environment:
      TOKEN_SECRET: ${KONGA_TOKEN_SECRET}
      DB_ADAPTER: ${KONG_DATABASE}
      DB_HOST: kong-database
      DB_PORT: 5432
      DB_DATABASE: ${KONGA_DB_NAME}
      DB_USER: ${KONG_DB_USERNAME}
      DB_PASSWORD: ${KONG_DB_PASSWORD}
      NODE_ENV: ${KONGA_ENV}
    ports:
      - "1337:1337"   # Interface web do Konga
    networks:
      - kong-visual-net
    depends_on:
      kong-database:
        condition: service_healthy
      konga-prepare:
        condition: service_completed_successfully
      kong:
        condition: service_healthy

volumes:
  kong-db-data: