apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard
data:
  orchestration-api.json: |
    {
      "title": "OrchestrationAPI - Observabilidade",
      "uid": "orchestration-metrics",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "10s",
      "time": { "from": "now-1h", "to": "now" },
      "timezone": "browser",
      "tags": ["orchestration", "aspnetcore"],
      "panels": [
        {
          "id": 1,
          "title": "Taxa de Requisições (req/s)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2 }
            },
            "overrides": []
          },
          "options": { "legend": { "displayMode": "list", "placement": "bottom" } },
          "targets": [
            {
              "expr": "sum(rate(http_requests_received_total{job=\"users-api\"}[1m]))",
              "legendFormat": "Users API",
              "refId": "A"
            },
            {
              "expr": "sum(rate(http_requests_received_total{job=\"catalog-api\"}[1m]))",
              "legendFormat": "Catalog API",
              "refId": "B"
            }
          ]
        },
        {
          "id": 2,
          "title": "Taxa de Erros 5xx (req/s)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "color": { "fixedColor": "red", "mode": "fixed" },
              "custom": { "drawStyle": "line", "fillOpacity": 20, "lineWidth": 2 }
            },
            "overrides": []
          },
          "options": { "legend": { "displayMode": "list", "placement": "bottom" } },
          "targets": [
            {
              "expr": "sum(rate(http_requests_received_total{job=\"users-api\",code=~\"5..\"}[1m]))",
              "legendFormat": "Users API - 5xx",
              "refId": "A"
            },
            {
              "expr": "sum(rate(http_requests_received_total{job=\"catalog-api\",code=~\"5..\"}[1m]))",
              "legendFormat": "Catalog API - 5xx",
              "refId": "B"
            }
          ]
        },
        {
          "id": 3,
          "title": "Latência P50 / P95 / P99 - Users API",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "drawStyle": "line", "fillOpacity": 5, "lineWidth": 2 }
            },
            "overrides": []
          },
          "options": { "legend": { "displayMode": "list", "placement": "bottom" } },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(http_request_duration_seconds_bucket{job=\"users-api\"}[5m])) by (le))",
              "legendFormat": "P50",
              "refId": "A"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job=\"users-api\"}[5m])) by (le))",
              "legendFormat": "P95",
              "refId": "B"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{job=\"users-api\"}[5m])) by (le))",
              "legendFormat": "P99",
              "refId": "C"
            }
          ]
        },
        {
          "id": 4,
          "title": "Latência P50 / P95 / P99 - Catalog API",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "drawStyle": "line", "fillOpacity": 5, "lineWidth": 2 }
            },
            "overrides": []
          },
          "options": { "legend": { "displayMode": "list", "placement": "bottom" } },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(http_request_duration_seconds_bucket{job=\"catalog-api\"}[5m])) by (le))",
              "legendFormat": "P50",
              "refId": "A"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job=\"catalog-api\"}[5m])) by (le))",
              "legendFormat": "P95",
              "refId": "B"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{job=\"catalog-api\"}[5m])) by (le))",
              "legendFormat": "P99",
              "refId": "C"
            }
          ]
        },
        {
          "id": 5,
          "title": "Requisições por Status Code - Users API",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2 }
            },
            "overrides": []
          },
          "options": { "legend": { "displayMode": "list", "placement": "bottom" } },
          "targets": [
            {
              "expr": "sum(rate(http_requests_received_total{job=\"users-api\"}[1m])) by (code)",
              "legendFormat": "{{code}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 6,
          "title": "Requisições por Status Code - Catalog API",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2 }
            },
            "overrides": []
          },
          "options": { "legend": { "displayMode": "list", "placement": "bottom" } },
          "targets": [
            {
              "expr": "sum(rate(http_requests_received_total{job=\"catalog-api\"}[1m])) by (code)",
              "legendFormat": "{{code}}",
              "refId": "A"
            }
          ]
        }
      ]
    }
