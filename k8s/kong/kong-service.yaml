# ─── Services ────────────────────────────────────────────────
# Fase 4: o proxy do Kong (entrada de tráfego dos clientes) passa a ser
# exposto via LoadBalancer (Azure Load Balancer Standard), substituindo o
# NodePort da Fase 3. Admin API e Kong Manager continuam só internos
# (ClusterIP) — não fazem sentido expostos publicamente na internet;
# acesse via port-forward:
#   kubectl port-forward service/kong-admin 8001:8001 -n kong
#   kubectl port-forward service/kong-admin 8002:8002 -n kong
apiVersion: v1
kind: Service
metadata:
  name: kong-proxy
  namespace: kong
spec:
  type: LoadBalancer
  selector:
    app: kong
  ports:
    - name: proxy
      port: 80
      targetPort: 8000 # kubectl get service kong-proxy -n kong → EXTERNAL-IP = ponto de entrada público
---
apiVersion: v1
kind: Service
metadata:
  name: kong-admin
  namespace: kong
spec:
  type: ClusterIP
  selector:
    app: kong
  ports:
    - name: admin
      port: 8001
      targetPort: 8001
    - name: manager
      port: 8002
      targetPort: 8002
