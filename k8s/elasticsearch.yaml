# PersistentVolumeClaim 
# Volume pequeno (1Gi) — o índice de busca é só um espelho dos dados do
# CatalogAPI, não precisa de armazenamento grande.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: elasticsearch-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
# Deployment
# Recursos pequenos (heap de 512MB, limite de 1Gi de
# memória) pra caber no cluster de 2 nodes Standard_D2s_v3 já ocupado
# por SQL Server, MongoDB, RabbitMQ, Redis, Kong e as APIs.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: elasticsearch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: elasticsearch
  template:
    metadata:
      labels:
        app: elasticsearch
    spec:
      # O Elasticsearch exige vm.max_map_count >= 262144 no host. O valor
      # padrão dos nodes do AKS costuma vir abaixo disso — sem esse
      # initContainer, o pod falha no bootstrap check ao iniciar.
      initContainers:
        - name: sysctl
          image: busybox:1.36
          command: ["sysctl", "-w", "vm.max_map_count=262144"]
          securityContext:
            privileged: true
      containers:
        - name: elasticsearch
          image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
          ports:
            - containerPort: 9200
          env:
            - name: discovery.type
              value: "single-node"
            - name: xpack.security.enabled
              value: "false"
            - name: ES_JAVA_OPTS
              value: "-Xms512m -Xmx512m"
          resources:
            requests:
              cpu: "250m"
              memory: "768Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          volumeMounts:
            - name: elasticsearch-data
              mountPath: /usr/share/elasticsearch/data
      volumes:
        - name: elasticsearch-data
          persistentVolumeClaim:
            claimName: elasticsearch-pvc

---
# ─── Service ─────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch-service
spec:
  selector:
    app: elasticsearch
  ports:
    - protocol: TCP
      port: 9200
      targetPort: 9200
  type: ClusterIP
